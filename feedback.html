<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Feedback Form</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="stylefeedback.css">
</head>
<body>

    <div class="overlay">
        <div class="form-container">
            <h1><i class="fa-solid fa-comments"></i> Feedback</h1>
            <p>Please let us know your thoughts and suggestions.</p>

            <form id="feedbackForm">

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-comment"></i>
                    <textarea id="comments" placeholder="Enter your comments" rows="4" required></textarea>
                </div>

                <button type="submit">Submit Feedback</button>
            </form>

            <div id="successMessage"></div>
        </div>
    </div>

    <script src="scriptfeedback.js"></script>
</body>
</html>
